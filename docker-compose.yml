services:
  postgres:
    image: postgres:16-alpine
    container_name: cata-postgres
    environment:
      POSTGRES_DB: cata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cata-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
